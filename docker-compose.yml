services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    ports:
      - "${OPENCLAW_GATEWAY_PORT_BIND:-127.0.0.1:18789:18789}"
    volumes:
      - ${HOME}/.openclaw:/home/node/.openclaw
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    networks:
      - internal

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    network_mode: "service:openclaw-gateway"
    volumes:
      - ${HOME}/.openclaw:/home/node/.openclaw
    depends_on:
      - openclaw-gateway
    entrypoint: ["tail", "-f", "/dev/null"]

  pixel-ui:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:80"
    volumes:
      - ${HOME}/.openclaw:/home/node/.openclaw
      - openclaw-db:/app/packages/backend/prisma/data
    environment:
      - OPENCLAW_GATEWAY_URL=ws://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - PIXEL_UI_ORIGIN=${PIXEL_UI_ORIGIN:-http://localhost:3333}
      - OPENCLAW_DATA_PATH=/home/node/.openclaw
      - NODE_ENV=production
      - DATABASE_URL=file:/app/packages/backend/prisma/data/openclaw.db
    depends_on:
      - openclaw-gateway
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  openclaw-db:
